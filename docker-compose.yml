# Docker Compose配置文件
version: '3.8'

services:
  collab-engine:
    build: .
    container_name: realtime-collab-engine
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - collab-network

networks:
  collab-network:
    driver: bridge
