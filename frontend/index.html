<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealtimeCollabEngine — 实时协作文档</title>
</head>
<body>
  <!-- 登录浮层 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">&#9998;</div>
      <h1>实时协作引擎</h1>
      <p>输入用户名开始协作</p>
      <div class="login-form">
        <input type="text" id="loginUsername" placeholder="用户名 (如 alice)" autocomplete="off" />
        <input type="password" id="loginPassword" placeholder="密码 (任意)" autocomplete="off" />
        <div class="login-error" id="loginError" style="display:none"></div>
        <button class="btn btn-primary" id="loginBtn" style="width:100%">进入</button>
      </div>
      <div class="login-hint">打开两个标签页，用不同用户名登录即可协作</div>
    </div>
  </div>

  <div id="app">

    <!-- ====== 左侧：文档列表面板 ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>&#9998; 协作引擎</h2>
        <button class="btn btn-primary btn-sm" id="newDocBtn" title="新建文档">+ 新建</button>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="搜索文档..." id="searchInput" />
      </div>
      <div class="doc-list" id="docList">
        <!-- 动态渲染 -->
      </div>
      <div class="sidebar-footer">
        <div class="status-row">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">未连接</span>
        </div>
      </div>
    </aside>

    <!-- ====== 右侧：主编辑区域 ====== -->
    <main class="main-area" id="mainArea">

      <!-- 空状态：未打开文档 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">&#x1f4c4;</div>
        <h2>欢迎使用实时协作引擎</h2>
        <p>从左侧选择一个文档开始编辑，或创建一个新文档</p>
        <button class="btn btn-primary" onclick="document.getElementById('newDocBtn').click()">+ 创建新文档</button>
      </div>

      <!-- 编辑状态：文档已打开 -->
      <div class="editor-workspace" id="editorWorkspace" style="display:none">

        <!-- 文档页 -->
        <div class="doc-page" id="docPage">
          <div class="doc-title-wrap">
            <input class="doc-title" id="docTitle" placeholder="无标题文档" value="无标题文档" />
            <span class="save-indicator" id="saveIndicator">已保存</span>
          </div>
          <div class="doc-meta">
            <span id="docMetaOwner"></span>
            <span class="meta-sep">·</span>
            <span id="docMetaTime"></span>
          </div>

          <div class="editor-container" id="editorContainer">
            <div class="editor-body" contenteditable="true" id="editor" spellcheck="false"></div>
            <!-- 远程光标浮层 -->
            <div class="remote-cursors-layer" id="cursorsLayer"></div>
          </div>
        </div>

      </div>
    </main>

    <!-- ====== 右侧：协作面板 ====== -->
    <aside class="collab-panel" id="collabPanel" style="display:none">
      <div class="panel-section">
        <h3>&#x1f465; 在线用户</h3>
        <ul class="collab-list" id="collabList">
          <li class="collab-item" id="localUserItem">
            <div class="collab-avatar" id="localAvatar"></div>
            <div class="collab-info">
              <span class="collab-name" id="localName"></span>
              <span class="collab-role">我</span>
            </div>
          </li>
        </ul>
      </div>
      <div class="panel-section">
        <h3>&#x1f4ca; 文档信息</h3>
        <div class="info-grid">
          <div class="info-item"><span class="info-label">字数</span><span class="info-value" id="infoChars">0</span></div>
          <div class="info-item"><span class="info-label">在线</span><span class="info-value" id="infoOnline">1</span></div>
        </div>
      </div>
      <div class="panel-section flex-fill">
        <h3>&#x1f4cb; 活动日志</h3>
        <div class="log-container" id="logContainer">
          <div class="log-entry">系统就绪</div>
        </div>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
